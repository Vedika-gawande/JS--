<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body style="background-color: rgb(40, 203, 132);color:whitesmoke">
    <ul class="language">
        <li>JS</li>
    </ul>
</body>
<script>
function addElement(lname){
    const li=document.createElement('li');
    li.innerHTML=`${lname}`
    document.querySelector('.language').appendChild(li)
}
addElement("python")
addElement('java')

function addLanguage(lname){
    const li=document.createElement('li');
    li.appendChild(document.createTextNode(lname)) 
    document.querySelector('.language').appendChild(li)
}
addLanguage('python')
// Edit
const secondLang=document.querySelector("li:nth-child(2)")
const newli=document.createElement('li')
newli.textContent="Mojo"
secondLang.replaceWith(newli)

const firstElement=document.querySelector("li:first-child")
firstElement.outerHTML="<li>TypeScript<li>"

// delete
const lastLang=document.querySelector("li:last-child")
lastLang.remove()
</script>
</html>
